<body class="bg-dark text-light">
    <div class="d-flex flex-column vh-100 position-fixed" style="width: 250px; background-color: #1e2a3a;">

        <!-- Encabezado -->
        <div class="p-3 border-bottom border-secondary">
            <div class="d-flex align-items-center">
                <div class=" d-flex align-items-center justify-content-center">
                    <img src="assets/logo.png" alt="" width="45" height="45">
                </div>
                <div class="ms-2">
                    <h6 class="mb-0 fw-bold">IglesiaHub</h6>
                    <small class="text-secondary">Panel Administrativo</small>
                </div>
            </div>
        </div>

        <!-- Menú principal -->
        <div class="p-3 flex-grow-1">
            <small class="text-secondary text-uppercase">Menú Principal</small>
            <ul class="nav flex-column mt-2">
                <li class="nav-item">
                    <a routerLink="donaciones" class="nav-link text-light d-flex align-items-center"
                        style="transition: background-color 0.3s;" onmouseover="this.style.backgroundColor='#2c3e50'"
                        onmouseout="this.style.backgroundColor='transparent'">
                        <i class="bi bi-heart me-2"></i> Donaciones
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="eventos" class="nav-link text-light d-flex align-items-center"
                        style="transition: background-color 0.3s;" onmouseover="this.style.backgroundColor='#2c3e50'"
                        onmouseout="this.style.backgroundColor='transparent'">
                        <i class="bi bi-calendar-event me-2"></i> Eventos
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="citas" class="nav-link text-light d-flex align-items-center"
                        style="transition: background-color 0.3s;" onmouseover="this.style.backgroundColor='#2c3e50'"
                        onmouseout="this.style.backgroundColor='transparent'">
                        <i class="bi bi-calendar-check me-2"></i> Citas
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="oraciones" class="nav-link text-light d-flex align-items-center"
                        style="transition: background-color 0.3s;" onmouseover="this.style.backgroundColor='#2c3e50'"
                        onmouseout="this.style.backgroundColor='transparent'">
                        <i class="bi bi-link-45deg me-2"></i> Oraciones
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="reseñas" class="nav-link text-light d-flex align-items-center"
                        style="transition: background-color 0.3s;" onmouseover="this.style.backgroundColor='#2c3e50'"
                        onmouseout="this.style.backgroundColor='transparent'">
                        <i class="bi bi-star me-2"></i> Reseñas
                    </a>
                </li>
                <li class="nav-item">
                    <a routerLink="usuarios" class="nav-link text-light d-flex align-items-center"
                        style="transition: background-color 0.3s;" onmouseover="this.style.backgroundColor='#2c3e50'"
                        onmouseout="this.style.backgroundColor='transparent'">
                        <i class="bi bi-people me-2"></i> Usuarios
                    </a>
                </li>
            </ul>
        </div>

        <!-- Cerrar sesión -->
        <div class="p-3 border-top border-secondary">
            <button onclick="return alert('Seguro que quieres cerrar sesion')" routerLink="/login"
                class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center">
                <i class="bi bi-box-arrow-right me-2"></i> Cerrar sesión
            </button>
        </div>

    </div>
