<div class="container">
    <h2>Formulario de Tipo de Donación</h2>
    <form [formGroup]="registroForm" (ngSubmit)="crearTipoDonacion()">
        <div class="form-group">
            <label for="nombre_donacion">Nombre de Donación</label>
            <input type="text" class="form-control" id="nombre_donacion" formControlName="nombre_donacion" required>
        </div>

        <div class="form-group">
            <label for="descripcion_donacion">Descripción de Donación</label>
            <textarea class="form-control" id="descripcion_donacion" formControlName="descripcion_donacion" rows="4"
                required></textarea>
        </div>

        <button type="submit" [disabled]="!registroForm.valid" class="btn btn-primary">Guardar</button>
        <button type="button" routerLink="/donaciones" class="btn btn-secondary">Cancelar</button>
    </form>
</div>
