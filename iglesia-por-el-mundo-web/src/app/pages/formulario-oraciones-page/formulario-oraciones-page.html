<div class="modal-dialog modal-lg">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Nueva Oración</h5>
            <a routerLink="/oraciones" type="button" class="btn-close" aria-label="Close"></a>
        </div>
        <div class="modal-body">
            <p class="text-muted">Crea una nueva oración para el día</p>

            <form>
                <div class="mb-3">
                    <label for="titulo" class="form-label fw-bold">Título</label>
                    <input type="text" class="form-control" id="titulo" placeholder="Ej: Oración de la Mañana">
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="fecha" class="form-label fw-bold">Fecha</label>
                        <input type="date" class="form-control" id="fecha" value="2025-11-13">
                    </div>
                    <div class="col-md-6">
                        <label for="categoria" class="form-label fw-bold">Categoría</label>
                        <select class="form-select" id="categoria">
                            <option selected>Mañana</option>
                            <option>Tarde</option>
                            <option>Noche</option>
                            <option>General</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="autor" class="form-label fw-bold">Autor</label>
                        <input type="text" class="form-control" id="autor" placeholder="Nombre del autor">
                    </div>
                    <div class="col-md-6">
                        <label for="estado" class="form-label fw-bold">Estado</label>
                        <select class="form-select" id="estado">
                            <option selected>Borrador</option>
                            <option>Publicado</option>
                            <option>Archivado</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="contenido" class="form-label fw-bold">Contenido de la Oración</label>
                    <textarea class="form-control" id="contenido" rows="4"
                        placeholder="Escribe el contenido de la oración aquí..."></textarea>
                </div>

                <div class="d-flex justify-content-end">
                    <button routerLink="/oraciones" type="button" class="btn btn-secondary me-2">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Crear Oración</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
